<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier une technologie</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="topbar">
            <div>
                <h1>Modifier une technologie</h1>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeTechnologies.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <form id="formEdit">
            <input type="text" id="nom_technologies" placeholder="Nom technologie" required>
            <input type="text" id="description_technologies" placeholder="Description de la technologie" required>
            <input type="text" id="id_projets" placeholder="Id projet attitré">
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editTechnologies.js"></script>
</body>
</html>
