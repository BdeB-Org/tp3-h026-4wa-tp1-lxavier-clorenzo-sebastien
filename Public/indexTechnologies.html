<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des technologies</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Gestion des technologies</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/indexTables.html">Retour</a>
                <a class="btn-link" href="/listeTechnologies.html">Voir la liste complète</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter une technologies</h2>
        <form id="formAjout">
            <input type="text" id="nom_technologies" placeholder="Nom technologie" required>
            <input type="text" id="description_technologies" placeholder="Description de la technologie" required>
            <input type="text" id="id_projets" placeholder="Id projet attitré">
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des technologies</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom technologie</th>
                    <th>Description de la technologie</th>
                    <th>Id projet attitré</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyTechnologies"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/indexTechnologies.js"></script>
</body>
</html>
