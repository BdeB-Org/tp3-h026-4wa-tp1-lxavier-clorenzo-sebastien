<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des étudiants</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Gestion des étudiants</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/liste.html">Voir la liste complète</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter un étudiant</h2>
        <form id="formAjout">
            <input type="text" id="Nom" placeholder="Nom" required>
            <input type="text" id="Prenom" placeholder="Prenom" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des étudiants</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prenom</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyEtudiants"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
