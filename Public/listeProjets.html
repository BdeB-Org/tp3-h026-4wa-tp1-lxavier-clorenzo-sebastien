<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des projets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Liste des projets</h1>
                <p class="small">Modifier et supprimer des projets existants</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/indexProjets.html">Retour à l'ajout</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom du projet</th>
                    <th>Description</th>
                    <th>Date de création</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyListe"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/listeProjets.js"></script>
</body>
</html>
