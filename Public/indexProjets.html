<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des projets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Gestion des étudiants</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeProjets.html">Voir la liste complète</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter un projet</h2>
        <form id="formAjout">
            <input type="text" id="Nom_Projet" placeholder="Nom du projet" required>
            <input type="text" id="description_projet" placeholder="Description" required>
            <input type="text" id="date_creation" placeholder="Date de création" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des projets</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom du projet</th>
                    <th>Description</th>
                    <th>Date de création</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyProjets"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/indexProjets.js"></script>
</body>
</html>
